<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review Annotator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --text-dim: #6e7681;
  --added-bg: #1f3d2a;
  --added-fg: #3fb950;
  --deleted-bg: #3d1f1f;
  --deleted-fg: #f85149;
  --selected-bg: #1a3a5c;
  --comment-open: #e3a44a;
  --comment-stale: #e3c84a;
  --comment-resolved: #6e7681;
  --accent: #58a6ff;
  --danger: #f85149;
  --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body { background: var(--bg); color: var(--text); font-family: var(--font-ui); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ─── Header ─── */
#header {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#project-name { font-weight: 600; font-size: 15px; }
#round-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 13px; color: var(--text-muted); }
#changed-count { color: var(--text-muted); font-size: 13px; }
.spacer { flex: 1; }
#btn-new-round {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
}
#btn-new-round:hover { background: var(--border); }
#btn-export {
  background: var(--accent); border: none; color: #000;
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
}
#btn-export:hover { opacity: 0.85; }

/* ─── Main Layout ─── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ─── Files Sidebar ─── */
#sidebar {
  width: 260px; flex-shrink: 0; background: var(--bg2);
  border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0;
}
.sidebar-title { padding: 6px 12px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: .5px; }
.file-item {
  padding: 5px 12px; cursor: pointer; border-left: 2px solid transparent;
  display: flex; flex-direction: column; gap: 2px;
}
.file-item:hover { background: var(--bg3); }
.file-item.active { background: var(--bg3); border-left-color: var(--accent); }
.file-item-name { font-size: 13px; font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-item-stats { display: flex; gap: 6px; font-size: 11px; }
.stat-added { color: var(--added-fg); }
.stat-deleted { color: var(--deleted-fg); }
.badge-open { color: var(--comment-open); }
.badge-stale { color: var(--comment-stale); }

/* ─── Diff Viewer ─── */
#diff-area { flex: 1; overflow-y: auto; background: var(--bg); }
#diff-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 15px; }

.diff-file-header { padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 13px; position: sticky; top: 0; z-index: 10; }
.diff-hunk-header { background: var(--bg3); color: var(--accent); font-family: var(--font-mono); font-size: 12px; padding: 3px 8px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); user-select: none; }

.diff-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 13px; }
.diff-table td { padding: 1px 4px; vertical-align: top; white-space: pre; }
.diff-table .td-old-ln, .diff-table .td-new-ln {
  width: 48px; min-width: 48px; text-align: right; color: var(--text-dim);
  user-select: none; padding-right: 8px; padding-left: 4px;
}
.diff-table .td-sign { width: 14px; text-align: center; user-select: none; }
.diff-table .td-code { width: 100%; }

.diff-line { cursor: pointer; }
.diff-line:hover .td-code { background: rgba(255,255,255,0.03); }
.diff-line.selected .td-code, .diff-line.selected .td-old-ln, .diff-line.selected .td-new-ln, .diff-line.selected .td-sign { background: var(--selected-bg) !important; }
.diff-line.type-added td { background: var(--added-bg); }
.diff-line.type-added .td-sign { color: var(--added-fg); }
.diff-line.type-deleted td { background: var(--deleted-bg); }
.diff-line.type-deleted .td-sign { color: var(--deleted-fg); }

/* ─── Add comment button ─── */
.add-comment-btn-row td { padding: 0; }
.add-comment-btn-wrap { padding: 2px 0 2px 64px; }
.add-comment-btn {
  font-size: 12px; padding: 2px 8px; background: var(--bg3);
  border: 1px solid var(--border); color: var(--accent); border-radius: 4px;
  cursor: pointer;
}
.add-comment-btn:hover { background: var(--border); }

/* ─── Inline comment form ─── */
.comment-form-row td { padding: 0; }
.comment-form-wrap {
  margin: 4px 8px 4px 64px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px;
}
.comment-form-wrap textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; padding: 6px 8px;
  font-family: var(--font-ui); font-size: 13px; resize: vertical; min-height: 72px;
  outline: none;
}
.comment-form-wrap textarea:focus { border-color: var(--accent); }
.comment-form-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.btn-primary { background: var(--accent); border: none; color: #000; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.comment-form-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ─── Comment threads ─── */
.comment-thread-row td { padding: 0; }
.comment-thread {
  margin: 2px 8px 4px 64px; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border);
}
.comment-thread.status-open { border-color: var(--comment-open); }
.comment-thread.status-stale { border-color: var(--border); background: var(--bg2); opacity: 0.8; }
.comment-thread.status-resolved { border-color: var(--border); opacity: 0.5; }
.comment-thread-header {
  display: flex; align-items: center; gap: 8px; padding: 5px 10px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
}
.comment-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-open .comment-status-dot { background: var(--comment-open); }
.status-stale .comment-status-dot { background: var(--comment-stale); }
.status-resolved .comment-status-dot { background: var(--comment-resolved); }
.comment-line-ref { font-family: var(--font-mono); font-weight: 600; color: var(--text); }
.comment-round-tag { color: var(--text-dim); font-size: 11px; }
.stale-icon { color: var(--comment-stale); }
.comment-thread-actions { margin-left: auto; display: flex; gap: 4px; }
.comment-action-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  padding: 2px 7px; border-radius: 3px; cursor: pointer; font-size: 11px;
}
.comment-action-btn:hover { background: var(--bg3); color: var(--text); }
.btn-danger:hover { border-color: var(--danger); color: var(--danger); }
.comment-body-wrap { padding: 8px 10px; background: var(--bg); font-size: 13px; line-height: 1.5; }
.comment-body-wrap.collapsed { display: none; }

/* ─── Modals ─── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 20px; min-width: 420px; max-width: 640px; width: 90%;
}
.modal h3 { margin-bottom: 12px; font-size: 15px; }
.modal p { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-confirm { background: #da3633; border: none; color: #fff; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-confirm:hover { background: #b91c1c; }

/* Export modal */
#export-modal .modal { max-width: 720px; }
.export-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.export-controls select {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 4px 8px; border-radius: 4px; font-size: 13px;
}
#export-output {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
  padding: 10px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6;
  white-space: pre-wrap; max-height: 360px; overflow-y: auto; cursor: pointer;
  color: var(--text); user-select: all;
}
#export-output:hover { border-color: var(--accent); }
.export-hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
#btn-copy { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
#btn-copy:hover { background: var(--border); }
#btn-copy.copied { background: var(--added-bg); border-color: var(--added-fg); color: var(--added-fg); }

/* ─── Round history selector ─── */
#round-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 3px 8px; border-radius: 4px; font-size: 13px; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <span id="project-name">Code Review</span>
  <span id="round-badge">Round 1</span>
  <span id="changed-count"></span>
  <div class="spacer"></div>
  <select id="round-select" title="View round history"></select>
  <button id="btn-new-round">New Round</button>
  <button id="btn-export">Export ▼</button>
</div>

<!-- Main -->
<div id="main">
  <div id="sidebar">
    <div class="sidebar-title">Files Changed</div>
    <div id="file-list"></div>
  </div>
  <div id="diff-area">
    <div id="diff-placeholder">← Select a file to review</div>
    <div id="diff-content" style="display:none"></div>
  </div>
</div>

<!-- New Round Confirm Modal -->
<div class="modal-overlay" id="round-modal">
  <div class="modal">
    <h3>Start New Round?</h3>
    <p>All open comments in the current round will be marked as <strong>stale</strong>. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-round-cancel">Cancel</button>
      <button class="btn-confirm" id="btn-round-confirm">Start New Round</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <h3>Export Review Prompt</h3>
    <div class="export-controls">
      <select id="export-file-select">
        <option value="">All files with open comments</option>
      </select>
      <select id="export-mode-select">
        <option value="fix">fix</option>
        <option value="report">report</option>
        <option value="both" selected>both</option>
      </select>
      <button id="btn-regen">Regenerate</button>
    </div>
    <div id="export-output" title="Click to select all"></div>
    <div class="export-hint">Click the box to select all, then copy.</div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-cancel" id="btn-export-close">Close</button>
      <button id="btn-copy">Copy</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const state = {
  files: [],          // FileDiffStat[]
  currentFile: null,  // string
  diff: null,         // ParsedDiff
  comments: [],       // ReviewComment[] for currentFile (all rounds)
  rounds: [],         // ReviewRound[]
  currentRound: 1,
  viewRound: null,    // null = current
  selection: null,    // { startLine, endLine, side }
  selectionAnchor: null, // { line, side }
}

// ─────────────────────────────────────────────
// API helpers
// ─────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } }
  if (body) opts.body = JSON.stringify(body)
  const r = await fetch(path, opts)
  if (!r.ok) throw new Error(await r.text())
  return r.json()
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
async function init() {
  await loadRounds()
  await loadFiles()
}

async function loadRounds() {
  const data = await api('GET', '/api/rounds')
  state.rounds = data.rounds
  state.currentRound = data.currentRound

  document.getElementById('round-badge').textContent = `Round ${state.currentRound}`

  const sel = document.getElementById('round-select')
  sel.innerHTML = ''
  const optCurrent = document.createElement('option')
  optCurrent.value = ''
  optCurrent.textContent = `Round ${state.currentRound} (current)`
  sel.appendChild(optCurrent)
  for (const r of [...state.rounds].reverse()) {
    if (r.id === state.currentRound) continue
    const opt = document.createElement('option')
    opt.value = r.id
    opt.textContent = `Round ${r.id} — ${new Date(r.createdAt).toLocaleString()}`
    sel.appendChild(opt)
  }
}

async function loadFiles() {
  const [files, rounds] = await Promise.all([
    api('GET', '/api/diff/summary'),
    api('GET', '/api/rounds'),
  ])
  state.files = files
  state.rounds = rounds.rounds
  state.currentRound = rounds.currentRound

  const viewRound = state.viewRound ?? state.currentRound
  const allComments = await api('GET', `/api/comments?round=all`)

  document.getElementById('changed-count').textContent = `Changes (${files.length})`

  const list = document.getElementById('file-list')
  list.innerHTML = ''

  for (const f of files) {
    const fileComments = allComments.filter(c => c.file === f.file && c.round === viewRound)
    const openCount = fileComments.filter(c => c.status === 'open').length
    const staleCount = fileComments.filter(c => c.status === 'stale').length

    const el = document.createElement('div')
    el.className = 'file-item' + (state.currentFile === f.file ? ' active' : '')
    el.dataset.file = f.file

    const nameEl = document.createElement('div')
    nameEl.className = 'file-item-name'
    nameEl.textContent = f.file
    nameEl.title = f.file

    const statsEl = document.createElement('div')
    statsEl.className = 'file-item-stats'
    statsEl.innerHTML = `<span class="stat-added">+${f.added}</span><span class="stat-deleted">-${f.deleted}</span>`
    if (openCount > 0) statsEl.innerHTML += ` <span class="badge-open">● ${openCount} open</span>`
    if (staleCount > 0) statsEl.innerHTML += ` <span class="badge-stale">⚠ ${staleCount} stale</span>`

    el.appendChild(nameEl)
    el.appendChild(statsEl)
    el.addEventListener('click', () => selectFile(f.file))
    list.appendChild(el)
  }
}

// ─────────────────────────────────────────────
// File / Diff
// ─────────────────────────────────────────────
async function selectFile(file) {
  state.currentFile = file
  state.selection = null
  state.selectionAnchor = null

  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.file === file)
  })

  const [diffData, comments] = await Promise.all([
    api('GET', `/api/diff?file=${encodeURIComponent(file)}`),
    api('GET', `/api/comments?file=${encodeURIComponent(file)}&round=all`),
  ])

  state.diff = diffData
  state.comments = comments

  renderDiff()
}

function renderDiff() {
  const container = document.getElementById('diff-content')
  const placeholder = document.getElementById('diff-placeholder')
  placeholder.style.display = 'none'
  container.style.display = 'block'
  container.innerHTML = ''

  const diff = state.diff
  if (!diff || !diff.hunks || diff.hunks.length === 0) {
    container.innerHTML = '<div style="padding:24px;color:var(--text-muted)">No changes in this file.</div>'
    return
  }

  const header = document.createElement('div')
  header.className = 'diff-file-header'
  header.textContent = diff.file
  container.appendChild(header)

  const table = document.createElement('table')
  table.className = 'diff-table'
  container.appendChild(table)

  const viewRound = state.viewRound ?? state.currentRound
  const fileComments = state.comments.filter(c => c.round === viewRound)
  const readonly = state.viewRound !== null && state.viewRound !== state.currentRound

  for (const hunk of diff.hunks) {
    // Hunk header row
    const hunkHeaderRow = table.insertRow()
    const hunkCell = hunkHeaderRow.insertCell()
    hunkCell.colSpan = 4
    hunkCell.className = 'diff-hunk-header'
    hunkCell.textContent = `@@ -${hunk.oldStart},${hunk.oldCount} +${hunk.newStart},${hunk.newCount} @@`

    // Collect lines with their absolute line numbers
    for (const line of hunk.lines) {
      const lineNum = line.type === 'deleted' ? line.oldLine : line.newLine
      const side = line.type === 'deleted' ? 'old' : 'new'

      const row = table.insertRow()
      row.className = `diff-line type-${line.type}`
      row.dataset.line = lineNum
      row.dataset.side = side

      const tdOld = row.insertCell(); tdOld.className = 'td-old-ln'
      const tdNew = row.insertCell(); tdNew.className = 'td-new-ln'
      const tdSign = row.insertCell(); tdSign.className = 'td-sign'
      const tdCode = row.insertCell(); tdCode.className = 'td-code'

      if (line.type === 'deleted') { tdOld.textContent = line.oldLine }
      else if (line.type === 'added') { tdNew.textContent = line.newLine }
      else { tdOld.textContent = line.oldLine; tdNew.textContent = line.newLine }

      tdSign.textContent = line.type === 'added' ? '+' : line.type === 'deleted' ? '-' : ' '
      tdCode.textContent = line.content

      // highlight if in current selection
      if (state.selection) {
        const s = state.selection
        if (side === s.side && lineNum >= s.startLine && lineNum <= s.endLine) {
          row.classList.add('selected')
        }
      }

      if (!readonly) {
        row.addEventListener('click', (e) => handleLineClick(e, lineNum, side))
      }
    }

    // After each hunk, render any comment threads anchored within that hunk's new lines range
    const hunkNewEnd = hunk.newStart + hunk.newCount - 1
    const hunkOldEnd = hunk.oldStart + hunk.oldCount - 1

    const hunkComments = fileComments.filter(c => {
      if (c.side === 'new') return c.endLine >= hunk.newStart && c.startLine <= hunkNewEnd
      else return c.endLine >= hunk.oldStart && c.startLine <= hunkOldEnd
    })

    if (hunkComments.length > 0) {
      for (const comment of hunkComments) {
        appendCommentThread(table, comment, readonly)
      }
    }
  }
}

// ─────────────────────────────────────────────
// Selection & Add Comment
// ─────────────────────────────────────────────
function handleLineClick(e, line, side) {
  if (e.shiftKey && state.selectionAnchor && state.selectionAnchor.side === side) {
    // extend selection
    const anchor = state.selectionAnchor.line
    state.selection = {
      startLine: Math.min(anchor, line),
      endLine: Math.max(anchor, line),
      side,
    }
  } else {
    state.selectionAnchor = { line, side }
    state.selection = { startLine: line, endLine: line, side }
  }
  renderDiff()
  // Show add-comment button after re-render
  showAddCommentButton()
}

function showAddCommentButton() {
  if (!state.selection) return
  const { endLine, side } = state.selection

  // Find the last selected row
  const rows = document.querySelectorAll('.diff-line.selected')
  if (rows.length === 0) return
  const lastRow = rows[rows.length - 1]

  // Remove existing btn row if any
  removeAddCommentUI()

  const btnRow = document.createElement('tr')
  btnRow.className = 'add-comment-btn-row'
  btnRow.id = 'add-comment-btn-row'
  const td = btnRow.insertCell()
  td.colSpan = 4
  const wrap = document.createElement('div')
  wrap.className = 'add-comment-btn-wrap'
  const btn = document.createElement('button')
  btn.className = 'add-comment-btn'
  btn.textContent = '+ Add review comment'
  btn.addEventListener('click', (e) => { e.stopPropagation(); showCommentForm() })
  wrap.appendChild(btn)
  td.appendChild(wrap)

  lastRow.insertAdjacentElement('afterend', btnRow)
}

function removeAddCommentUI() {
  document.getElementById('add-comment-btn-row')?.remove()
  document.getElementById('comment-form-row')?.remove()
}

function showCommentForm() {
  removeAddCommentUI()
  if (!state.selection) return
  const { startLine, endLine, side } = state.selection

  const rows = document.querySelectorAll('.diff-line.selected')
  if (rows.length === 0) return
  const lastRow = rows[rows.length - 1]

  const formRow = document.createElement('tr')
  formRow.className = 'comment-form-row'
  formRow.id = 'comment-form-row'
  const td = formRow.insertCell()
  td.colSpan = 4

  const wrap = document.createElement('div')
  wrap.className = 'comment-form-wrap'

  const lineRef = startLine === endLine ? `L${startLine}` : `L${startLine}–L${endLine}`
  const hint = document.createElement('div')
  hint.className = 'comment-form-hint'
  hint.textContent = `Comment on ${lineRef} (${side} side) — Enter to submit, Escape to cancel`

  const textarea = document.createElement('textarea')
  textarea.placeholder = 'Leave a review comment...'

  const actions = document.createElement('div')
  actions.className = 'comment-form-actions'

  const cancelBtn = document.createElement('button')
  cancelBtn.className = 'btn-cancel'
  cancelBtn.textContent = 'Cancel'
  cancelBtn.addEventListener('click', () => { removeAddCommentUI(); state.selection = null; renderDiff() })

  const submitBtn = document.createElement('button')
  submitBtn.className = 'btn-primary'
  submitBtn.textContent = 'Add Comment'
  submitBtn.addEventListener('click', () => submitComment(textarea.value.trim()))

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(textarea.value.trim()) }
    if (e.key === 'Escape') { removeAddCommentUI(); state.selection = null; renderDiff() }
  })

  actions.appendChild(cancelBtn)
  actions.appendChild(submitBtn)
  wrap.appendChild(hint)
  wrap.appendChild(textarea)
  wrap.appendChild(actions)
  td.appendChild(wrap)
  formRow.insertAdjacentElement('afterend', formRow) // placeholder

  lastRow.insertAdjacentElement('afterend', formRow)
  textarea.focus()
}

async function submitComment(body) {
  if (!body || !state.selection || !state.currentFile) return
  const { startLine, endLine, side } = state.selection
  await api('POST', '/api/comments', {
    file: state.currentFile,
    startLine,
    endLine,
    side,
    body,
  })
  state.selection = null
  state.selectionAnchor = null
  await refreshCurrentFile()
}

// ─────────────────────────────────────────────
// Comment Threads
// ─────────────────────────────────────────────
function appendCommentThread(table, comment, readonly) {
  const row = table.insertRow()
  row.className = 'comment-thread-row'
  const td = row.insertCell()
  td.colSpan = 4

  const thread = document.createElement('div')
  thread.className = `comment-thread status-${comment.status}`
  thread.id = `thread-${comment.id}`

  const lineRef = comment.startLine === comment.endLine
    ? `L${comment.startLine}`
    : `L${comment.startLine}–L${comment.endLine}`

  const hdr = document.createElement('div')
  hdr.className = 'comment-thread-header'

  const dot = document.createElement('span')
  dot.className = 'comment-status-dot'

  const ref = document.createElement('span')
  ref.className = 'comment-line-ref'
  ref.textContent = lineRef

  const side = document.createElement('span')
  side.style.color = 'var(--text-dim)'
  side.textContent = `(${comment.side})`

  hdr.appendChild(dot)
  hdr.appendChild(ref)
  hdr.appendChild(side)

  if (comment.status === 'stale') {
    const staleTag = document.createElement('span')
    staleTag.className = 'stale-icon comment-round-tag'
    staleTag.textContent = `⚠ Round ${comment.round}`
    hdr.appendChild(staleTag)
  }

  if (!readonly) {
    const actions = document.createElement('div')
    actions.className = 'comment-thread-actions'

    if (comment.status === 'open') {
      const resolveBtn = document.createElement('button')
      resolveBtn.className = 'comment-action-btn'
      resolveBtn.textContent = 'Resolve'
      resolveBtn.addEventListener('click', () => updateCommentStatus(comment.id, 'resolved'))
      actions.appendChild(resolveBtn)
    }

    if (comment.status === 'stale') {
      const reopenBtn = document.createElement('button')
      reopenBtn.className = 'comment-action-btn'
      reopenBtn.textContent = 'Reopen'
      reopenBtn.addEventListener('click', () => updateCommentStatus(comment.id, 'open'))

      const dismissBtn = document.createElement('button')
      dismissBtn.className = 'comment-action-btn'
      dismissBtn.textContent = 'Dismiss'
      dismissBtn.addEventListener('click', () => updateCommentStatus(comment.id, 'resolved'))

      actions.appendChild(reopenBtn)
      actions.appendChild(dismissBtn)
    }

    if (comment.status === 'resolved') {
      const toggleBtn = document.createElement('button')
      toggleBtn.className = 'comment-action-btn'
      toggleBtn.textContent = 'Show'
      toggleBtn.addEventListener('click', () => {
        const body = thread.querySelector('.comment-body-wrap')
        body.classList.toggle('collapsed')
        toggleBtn.textContent = body.classList.contains('collapsed') ? 'Show' : 'Hide'
      })
      actions.appendChild(toggleBtn)
    }

    const delBtn = document.createElement('button')
    delBtn.className = 'comment-action-btn btn-danger'
    delBtn.textContent = '✕'
    delBtn.addEventListener('click', () => deleteComment(comment.id))
    actions.appendChild(delBtn)

    hdr.appendChild(actions)
  }

  const body = document.createElement('div')
  body.className = 'comment-body-wrap' + (comment.status === 'resolved' ? ' collapsed' : '')
  body.textContent = comment.body

  thread.appendChild(hdr)
  thread.appendChild(body)
  td.appendChild(thread)
}

async function updateCommentStatus(id, status) {
  await api('PATCH', `/api/comments/${id}`, { status })
  await refreshCurrentFile()
}

async function deleteComment(id) {
  await api('DELETE', `/api/comments/${id}`)
  await refreshCurrentFile()
}

async function refreshCurrentFile() {
  if (!state.currentFile) return
  const [diffData, comments] = await Promise.all([
    api('GET', `/api/diff?file=${encodeURIComponent(state.currentFile)}`),
    api('GET', `/api/comments?file=${encodeURIComponent(state.currentFile)}&round=all`),
  ])
  state.diff = diffData
  state.comments = comments
  renderDiff()
  await loadFiles() // refresh sidebar badges
}

// ─────────────────────────────────────────────
// New Round
// ─────────────────────────────────────────────
document.getElementById('btn-new-round').addEventListener('click', () => {
  document.getElementById('round-modal').classList.add('open')
})
document.getElementById('btn-round-cancel').addEventListener('click', () => {
  document.getElementById('round-modal').classList.remove('open')
})
document.getElementById('btn-round-confirm').addEventListener('click', async () => {
  document.getElementById('round-modal').classList.remove('open')
  await api('POST', '/api/rounds')
  state.viewRound = null
  await loadRounds()
  await loadFiles()
  if (state.currentFile) await refreshCurrentFile()
})

// ─────────────────────────────────────────────
// Round history selector
// ─────────────────────────────────────────────
document.getElementById('round-select').addEventListener('change', async (e) => {
  const val = e.target.value
  state.viewRound = val === '' ? null : parseInt(val, 10)
  await loadFiles()
  if (state.currentFile) await refreshCurrentFile()
})

// ─────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', async () => {
  // Populate file dropdown
  const allComments = await api('GET', '/api/comments?status=open')
  const filesWithComments = [...new Set(allComments.map(c => c.file))]

  const sel = document.getElementById('export-file-select')
  sel.innerHTML = '<option value="">All files with open comments</option>'
  for (const f of filesWithComments) {
    const opt = document.createElement('option')
    opt.value = f
    opt.textContent = f
    sel.appendChild(opt)
  }

  await refreshExport()
  document.getElementById('export-modal').classList.add('open')
})

async function refreshExport() {
  const file = document.getElementById('export-file-select').value
  const mode = document.getElementById('export-mode-select').value
  const params = new URLSearchParams({ mode })
  if (file) params.set('file', file)
  const data = await api('GET', `/api/export?${params}`)
  document.getElementById('export-output').textContent = data.prompt
}

document.getElementById('btn-regen').addEventListener('click', refreshExport)
document.getElementById('export-file-select').addEventListener('change', refreshExport)
document.getElementById('export-mode-select').addEventListener('change', refreshExport)

document.getElementById('btn-export-close').addEventListener('click', () => {
  document.getElementById('export-modal').classList.remove('open')
})

document.getElementById('btn-copy').addEventListener('click', async () => {
  const text = document.getElementById('export-output').textContent
  await navigator.clipboard.writeText(text)
  const btn = document.getElementById('btn-copy')
  btn.textContent = 'Copied!'
  btn.classList.add('copied')
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied') }, 2000)
})

document.getElementById('export-output').addEventListener('click', function() {
  const range = document.createRange()
  range.selectNodeContents(this)
  const sel = window.getSelection()
  sel.removeAllRanges()
  sel.addRange(range)
})

// close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open')
  })
})

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
init()
</script>
</body>
</html>
